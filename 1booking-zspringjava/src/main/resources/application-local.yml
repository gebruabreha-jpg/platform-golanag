spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/onepagecommerce_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none

logging:
  level:
    com.onebooking: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
