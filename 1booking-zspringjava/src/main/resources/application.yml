server:
  port: 8080

spring:
  application:
    name: 1booking-zspringjava

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Datasource
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/onepagecommerce_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 5000

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  # Flyway migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000ms}

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  # CORS
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT
jwt:
  secret: ${JWT_SECRET:super_secret_jwt_key_change_in_production_min_32_chars}
  refresh-secret: ${JWT_REFRESH_SECRET:super_secret_refresh_key_change_in_production_min_32_chars}
  access-expiry-minutes: 15
  refresh-expiry-days: 7
  bcrypt-rounds: 12

# Rate limiting
rate-limit:
  window-ms: 60000
  max-requests: 100

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3001,http://localhost:3000}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS

# Stripe
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_xxx}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_xxx}

# S3 / MinIO
s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:minioadmin}
  secret-key: ${S3_SECRET_KEY:minioadmin}
  bucket: ${S3_BUCKET:onepagecommerce-media}

# App
app:
  url: ${APP_URL:http://localhost:8080}
  security:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3001,http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI / Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
