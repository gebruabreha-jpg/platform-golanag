name: AI Service CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'connectme/ai-service/**'
      - '.github/workflows/ai-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'connectme/ai-service/**'

jobs:
  test:
    name: Test AI Service (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: connectme_user
          POSTGRES_PASSWORD: connectme_pass_2024
          POSTGRES_DB: connectme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: connectme/ai-service/requirements.txt

      - name: Install dependencies
        working-directory: ./connectme/ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install spaCy model
        working-directory: ./connectme/ai-service
        run: |
          python -m spacy download en_core_web_sm

      - name: Run linter (black)
        working-directory: ./connectme/ai-service
        run: |
          pip install black
          black --check app/

      - name: Run type checker (mypy)
        working-directory: ./connectme/ai-service
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports

      - name: Run tests with pytest
        working-directory: ./connectme/ai-service
        run: |
          pip install pytest pytest-asyncio
          pytest -v --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql://connectme_user:connectme_pass_2024@localhost:5432/connectme_test
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./connectme/ai-service/coverage.xml
          flags: ai-service
          name: ai-service-coverage

  build:
    name: Build AI Service Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./connectme/ai-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ai-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
