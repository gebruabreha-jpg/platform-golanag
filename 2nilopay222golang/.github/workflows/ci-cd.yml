name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nilo_user
          POSTGRES_PASSWORD: nilo_password_123
          POSTGRES_DB: nilo_commerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Push Schema to Test DB
        working-directory: ./backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://nilo_user:nilo_password_123@localhost:5432/nilo_commerce_test

      - name: Run Linter
        working-directory: ./backend
        run: npm run lint

      - name: Run Type Check
        working-directory: ./backend
        run: npm run typecheck

      - name: Run Tests
        working-directory: ./backend
        run: npm test
        env:
          DATABASE_URL: postgresql://nilo_user:nilo_password_123@localhost:5432/nilo_commerce_test
          JWT_SECRET: test_secret
          STRIPE_SECRET_KEY: sk_test_xxx
          STRIPE_WEBHOOK_SECRET: whsec_test
          WISE_API_TOKEN: test_token
          WISE_API_PROFILE_ID: test_profile

  lint-and-typecheck-web:
    name: Web Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        working-directory: ./web
        run: npm ci

      - name: Run Linter
        working-directory: ./web
        run: npm run lint

      - name: Type Check
        working-directory: ./web
        run: npm run typecheck

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, lint-and-typecheck-web]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Production (ECS)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to production..."
          # Add deployment commands here (AWS CLI, ECS update, etc.)
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
