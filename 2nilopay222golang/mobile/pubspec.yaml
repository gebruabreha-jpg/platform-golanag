name: nilo_commerce
description: "Closed-loop B2B2C cross-border bill payment platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  provider: ^6.1.1

  # Networking
  dio: ^5.3.2
  retrofit: ^4.0.1
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^8.0.0
  shared_preferences: ^2.2.2

  # Localization
  easy_localization: ^3.0.2

  # UI Components
  flutter_svg: ^2.0.7
  cached_network_image: ^3.2.3
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Payment
  stripe_sdk: ^5.0.0
  flutter_stripe: ^8.0.0

  # Utils
  intl: ^0.18.0
  uuid: ^4.2.1
  validators: ^3.0.0

  # Device info
  device_info_plus: ^9.1.0
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
