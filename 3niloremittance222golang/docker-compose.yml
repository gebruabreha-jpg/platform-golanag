version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nilo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nilo_user
      POSTGRES_PASSWORD: nilo_password_123
      POSTGRES_DB: nilo_commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nilo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nilo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nilo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nilo_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: nilo_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - nilo_network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nilo_network:
    driver: bridge
