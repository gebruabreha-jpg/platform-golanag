[program:http3_server_ipv4_a]
command     =  /usr/app/bin/http3server 0.0.0.0 443 /usr/app/cert.key /usr/app/cert.crt --quiet --dl-bandwidth 200M
directory   = ./
user        = root
startsecs   = 5

redirect_stderr         = true
stdout_logfile_maxbytes = 50MB
stdout_logfile_backups  = 10
stdout_logfile          = /var/log/http3_server_ipv4_a.log

