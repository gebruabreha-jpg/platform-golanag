[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log

[program:dnsmasq]
command=dnsmasq -k
autostart=true
autorestart=true
stderr_logfile=/var/log/dnsmasq.log
stdout_logfile=/var/log/dnsmasq.log

[program:http_server]
command=/usr/app/bin/http-server -port 8080 
autostart=true
autorestart=true
stderr_logfile=/var/log/http-server-error.log
stdout_logfile=/var/log/http-server-access.log


