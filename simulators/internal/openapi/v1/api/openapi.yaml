          description: "Optional private argument, used to carry additional routing\
            \ attributes to consumer. This private argument will not be involved in\
            \ route calculation."
          type: string
        network_instance:
          description: The network instance which nexthop belongs to.
          type: string
        afi:
          description: Address family.
          enum:
          - ipv4
          - ipv6
          type: string
        entry:
          description: "Nexthop entry, used to indicate the address information of\
            \ the nexthop or whether there is a via nexthop. If above 'action' is\
            \ \"add\", the item is required."
          items:
            $ref: '#/components/schemas/PublishedNexthop_entry_inner'
          type: array
          uniqueItems: true
        timestamp:
          format: date-time
          type: string
      type: object
    ClientIdentifier:
      example:
        name: name
      properties:
        name:
          description: "Indicates client name. For route-engine, client name is like\
            \ {cre-pod-name} + {static/bgp/ifm}, for data-plane, client name is like\
            \ {dp-pod-name}, for client that is service, client name is like {service-name}."
          type: string
      type: object
    route_type:
      description: route or protocol type.
      enum:
      - static
      - bgp
      - connect
      type: string
    route_lsp_type:
      description: "if the route is lsp or non-lsp. If not present, the default is\
        \ non-lsp."
      enum:
      - non_lsp
      - lsp
      type: string
    Timestamp:
      format: date-time
      type: string
    If_type:
      description: Interface type.
      enum:
      - ETHERNET
      - VLAN
      - GRE
      type: string
    Ipv4Address:
      example: 198.51.100.1
      nullable: true
      type: string
    Ipv6Address:
      example: 2001:db8:85a3::8a2e:370:7334
      nullable: true
      type: string
    IpAddress:
      type: string
    Ipv4Prefix:
      example: 198.51.100.1/24
      nullable: true
      type: string
    Ipv6Prefix:
      example: 2001:db8:abcd:12::0/64
      nullable: true
      type: string
    IpPrefix:
      type: string
    IpOrPrefix:
      type: string
    InvalidParam:
      properties:
        param:
          type: string
        reason:
          type: string
      required:
      - param
      type: object
    ProblemDetails:
      properties:
        type:
          format: uri
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          format: uri
          type: string
        cause:
          type: string
        invalidParams:
          items:
            $ref: '#/components/schemas/InvalidParam'
          minItems: 1
          type: array
      type: object
    NotifyInformation_msg:
      description: Message content.
      oneOf:
      - $ref: '#/components/schemas/NexthopNotification'
      - $ref: '#/components/schemas/PrefixNotification'
      - $ref: '#/components/schemas/RedistributionNotification'
      - $ref: '#/components/schemas/NexthopResponseEOF'
      - $ref: '#/components/schemas/PerfixResponseEOF'
      - $ref: '#/components/schemas/RedistributionEOF'
      - $ref: '#/components/schemas/PublishedRoutes'
      - $ref: '#/components/schemas/PublishedNexthops'
      - $ref: '#/components/schemas/RouteEOFToConsumer'
      type: object
    PublishedRoute_nh:
      description: "Nexthop; nexthop identifer which composed by nexthop network_instance\
        \ and nexthop id. If above 'action' is \"add\", the item is required."
      properties:
        network_instance:
          description: The network instance which nexthop belongs to.
          type: string
        id:
          description: "Nexthop id, identify a nexthop."
          type: integer
      type: object
    PublishedNexthop_entry_inner_via_nh:
      description: "Via nexthop identifer which composed by nexthop network_instance\
        \ and nexthop id. If \"entry\" exists, \"via_nh\" is required."
      properties:
        network_instance:
          description: "If \"via_nh\" exists, \"network_instance\" is required. The\
            \ network_instance which via nexthop belongs to."
          type: string
        id:
          description: "Nexthop id, identify a nexthop. Optional, if \"id\" is empty(none),\
            \ it means that the current nexthop is the final nexthop."
          type: integer
      type: object
    PublishedNexthop_entry_inner_viaNexthopId:
      description: "Via nexthop identifer which composed by nexthop networkInstance\
        \ and nexthop id. If \"entry\" exists, \"viaNexthopId\" is required."
      properties:
        networkInstance:
          description: "If \"viaNexthopId\" exists, \"networkInstance\" is required.\
            \ The networkInstance which via nexthop belongs to."
          type: string
        id:
          description: "Nexthop id, identify a nexthop. Optional, if \"id\" is empty(none),\
            \ it means that the current nexthop is the final nexthop."
          type: integer
      type: object
    PublishedNexthop_entry_inner:
      description: "Specific content of nexthop, including via_nh, nh_addr, label."
      properties:
        via_nh:
          $ref: '#/components/schemas/PublishedNexthop_entry_inner_via_nh'
        viaNexthopId:
          $ref: '#/components/schemas/PublishedNexthop_entry_inner_viaNexthopId'
        nh_addr:
          $ref: '#/components/schemas/IpAddress'
        label:
          description: For vpn and mpls label forwarding.
          type: integer
        networkInstance:
          description: The networkInstance which nh_addr belongs to.
          type: string
        if_type:
          $ref: '#/components/schemas/If_type'
      type: object
