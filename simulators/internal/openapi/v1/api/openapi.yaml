openapi: 3.0.2
info:
  contact:
    email: PDLDPDEVEL@pdl.internal.ericsson.com
  description: API for Routing Information Base.
  license:
    name: Ericsson
  title: Routing Information Base API
  version: 1.0.0
  x-api-id: 58092dd3-1fcd-4521-87fa-3cee018cfd9c
  x-audience: internal
  x-doc-no: CAF 201 002
servers:
- description: Routing Information Base
  url: "https://{ApiRoot}:port/paths"
  variables:
    ApiRoot:
      default: eric-pc-routing-information-base
tags:
- description: route producer client register to routing information base.
  name: route-producer-registration
- description: route consumer client register to routing information base.
  name: route-consumer-registration
- description: route related opertions.
  name: route-related-operation
paths:
  /v1/clients:
    patch:
      description: Update client.
      operationId: update_client
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
        required: true
      responses:
        "201":
          description: client updated.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - clients
    post:
      callbacks:
        notifyInformation:
          '{$request.body#/consumer_info/url_callback}':
            post:
              operationId: notify_information
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/NotifyInformation'
                required: true
              responses:
                "200":
                  description: received successfully.
                "400":
                  content:
                    application/problem+json:
                      schema:
                        $ref: '#/components/schemas/ProblemDetails'
                  description: Bad request
                "500":
                  content:
                    application/problem+json:
                      schema:
                        $ref: '#/components/schemas/ProblemDetails'
                  description: Internal Server Error
              summary: "notify information to clients, please refer to NotifyInformation\
                \ below."
              x-callback-request: true
      description: Register client with RIB as producer or consumer or both
      operationId: register_client
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
        required: true
      responses:
        "201":
          description: client is registered.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - clients
  /v1/clients/{client-name}:
    delete:
      description: "Deregister client from RIB. If the client is both a producer and\
        \ a consumer, the two roles will be both deregistered."
      operationId: deregister_client
      parameters:
      - description: "client name, please refer to the client_identifier provided\
          \ by client when it register to RIB."
        explode: false
        in: path
        name: client-name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: client deleted.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - clients
  /v1/network-instances/{network-instance-name}/routes:
    delete:
      description: "bulk delete the routes of the specified client under {network-instance-name}."
      operationId: bulk_delete_routes
      parameters:
      - description: name of network-instance that the routes belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteRoutes'
        required: true
      responses:
        "200":
          description: handle bulk delete routes successfully.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - bulk_delete_routes
    post:
      description: "Producer client adds or updates or deletes routes, support bulk\
        \ routes on one time. Because of the scenarios where we need send mixed messages\
        \ of routes addition and deletion in one message, we use this API to receive\
        \ routes addition and deletion request."
      operationId: route_operation
      parameters:
      - description: name of network instance that the routes belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Routes'
        required: true
      responses:
        "201":
          description: All routes handled successfully.
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesOperationResult'
          description: routes are handled partially successfully.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - routes
  /v1/network-instances/{network-instance-name}/nexthops:
    delete:
      description: deregister nexthop.
      operationId: deregister_nexthop
      parameters:
      - description: network-instance to which the nexthop belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NexthopRegister'
        required: true
      responses:
        "204":
          description: "deregister all nexthop successfully, the nexthops deleted."
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NexthopRegisterResult'
          description: operation result.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - nexthop
    post:
      description: "Register nexthop in RIB. if producer client wants to be aware\
        \ of the change for a nexthop, it can register the nexthop to RIB. Thus RIB\
        \ can notify producer client once the nexthop changed."
      operationId: register_nexthop
      parameters:
      - description: network-instance to which the nexthop belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NexthopRegister'
        required: true
      responses:
        "201":
          description: register all nexthop successfully.
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NexthopRegisterResult'
          description: operation result.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - nexthop
  /v1/network-instances/{network-instance-name}/clients/{client-name}/nexthop-reg-eof:
    post:
      description: "During startup, producer client should call this API to send nexthop\
        \ registration EOF to RIB after it registered all its nexthop with RIB. RIB\
        \ need know if producer client finished register nexthop with RIB."
      operationId: receive_nexthop_registration_eof
      parameters:
      - description: network-instance to which the eof belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      - description: "client name, please refer to the client_identifier provided\
          \ by client when it register to RIB."
        explode: false
        in: path
        name: client-name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "201":
          description: handle eof information successfully.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - nexthop_registration_eof
  /v1/network-instances/{network-instance-name}/prefixes:
    delete:
      description: deregister a prefix.
      operationId: deregister_prefix
      parameters:
      - description: network-instance to which the prefix belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrefixRegister'
        required: true
      responses:
        "204":
          description: "deregister all prefixs successfully, the prefixs deleted."
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrefixRegisterResult'
          description: operation result.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - prefix
    post:
      description: "Register a prefix. if producer client want to be aware of the\
        \ change for a prefix, it can register the prefix to RIB. Thus RIB can notify\
        \ producer client once the prefix changed."
      operationId: register_prefix
      parameters:
      - description: network-instance to which the prefix belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrefixRegister'
        required: true
      responses:
        "201":
          description: register all prefixs successfully.
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrefixRegisterResult'
          description: operation result.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - prefix
  /v1/network-instances/{network-instance-name}/clients/{client-name}/prefix-reg-eof:
    post:
      description: "During startup, producer client should call this API to send prefix\
        \ registration EOF to RIB after it registered all its prefix with RIB. RIB\
        \ need know if producer client finished register prefix with RIB."
      operationId: receive_prefix_registration_eof
      parameters:
      - description: network-instance to which the eof belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      - description: "client name, please refer to the client_identifier provided\
          \ by client when it register to RIB."
        explode: false
        in: path
        name: client-name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "201":
          description: handle eof information successfully.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - prefix_registration_eof
  /v1/network-instances/{network-instance-name}/clients/{client-name}/route-eof:
    post:
      description: "During startup, producer client should call this API to send route\
        \ EOF to RIB after it finishes sending all its routes of a network-instance\
        \ to RIB."
      operationId: receive_route_eof
      parameters:
      - description: network-instance to which the eof belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      - description: "client name, please refer to the client_identifier provided\
          \ by client when it register to RIB."
        explode: false
        in: path
        name: client-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteEoFFromProducer'
        required: true
      responses:
        "201":
          description: handle eof information successfully.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - route_eof
  /v1/network-instances/{network-instance-name}/redistribution:
    delete:
      description: "Delete redistribution configuration from routing protocol(a producer\
        \ client), such as BGP."
      operationId: delete_route_redistribution
      parameters:
      - description: network-instance to which the configuration belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Redistribution'
        required: true
      responses:
        "204":
          description: redistribution configuration deleted.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - redistribution
    patch:
      description: "update redistribution configuration from routing protocol(a producer\
        \ client), such as from BGP."
      operationId: update_route_redistribution
      parameters:
      - description: network-instance to which the configuration belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Redistribution'
        required: true
      responses:
        "201":
          description: redistribution configuration updated.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - redistribution
    post:
      description: "Add redistribution configuration from routing protocol(a producer\
        \ client), now the only producer client with this capability right now is\
        \ BGP."
      operationId: add_route_redistribution
      parameters:
      - description: network-instance to which the configuration belongs to.
        explode: false
        in: path
        name: network-instance-name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Redistribution'
        required: true
      responses:
        "201":
          description: redistribution configuration added.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Bad request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Not Found
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Internal Server Error
      tags:
      - redistribution
  /v1/heartbeats:
    post:
      description: client send heartbeat to RIB.
      operationId: heartbeat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Heartbeat'
        required: true
      responses:
        "200":
          description: "RIB receive heartbeat from client, and the client is in normal\
            \ in RIB."
        "404":
          description: "RIB receive heartbeat from client, but the client does not\
            \ existed in RIB."
        "500":
          description: Internal server error.
      tags:
      - heartbeat
components:
  responses:
    "400":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Bad request
    "401":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Unauthorized
    "403":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Forbidden
    "404":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Not Found
    "405":
      description: Method Not Allowed
    "406":
      description: 406 Not Acceptable
    "408":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Request Timeout
    "409":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Conflict
    "410":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Gone
    "411":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Length Required
    "412":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Precondition Failed
    "413":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Payload Too Large
    "414":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: URI Too Long
    "415":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Unsupported Media Type
    "429":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Too Many Requests
      headers:
        X-RateLimit-Limit:
          description: Request limit per hour.
          explode: false
          schema:
            type: integer
          style: simple
        X-RateLimit-Remaining:
          description: The number of requests left for the time window.
          explode: false
          schema:
            type: integer
          style: simple
        X-RateLimit-Reset:
          description: The UTC date/time at which the current rate limit window resets.
          explode: false
          schema:
            format: date-time
            type: string
          style: simple
    "500":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Internal Server Error
    "501":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Not Implemented
    "503":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Service Unavailable
    "504":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
      description: Gateway Timeout
    default:
      description: Generic Error
  schemas:
    Client:
      example:
        consumer_info:
          url_callback: http(s)://podip:port/v1/receive-notification/
          network_instance_filters:
          - network_instance_filters
          - network_instance_filters
          keepalive_timeout: 1
          route_filters:
          - static
          - static
        producer_info:
          url_callback: http(s)://podip:port/v1/receive-notification/
          rt_hold_time: 0
          service_name: service_name
          keepalive_timeout: 6
          stale_route: "true"
        client_id:
          name: name
      properties:
        client_id:
          $ref: '#/components/schemas/ClientIdentifier'
        producer_info:
          $ref: '#/components/schemas/producer_info'
        consumer_info:
          $ref: '#/components/schemas/consumer_info'
      type: object
    producer_info:
      example:
        url_callback: http(s)://podip:port/v1/receive-notification/
        rt_hold_time: 0
        service_name: service_name
        keepalive_timeout: 6
        stale_route: "true"
      properties:
        service_name:
          type: string
        rt_hold_time:
          description: "for producer client, unit is second. RIB will hold the routes\
            \ for the specified time after the producer client get dead. If not present,\
            \ RIB will give a default value."
          type: integer
        keepalive_timeout:
          description: "Unit is second. Indicates how long RIB has not received the\
            \ client's heartbeat before it considers the client to be dead. If not\
            \ present, RIB will give a default value. If value = 0, indicates that\
            \ the RIB will never delete the producer based on heartbeat(For service\
            \ producer scenario)."
          type: integer
        stale_route:
          description: "Optional field. This field is used to tell RIB when the producer\
            \ registers whether to trigger the route stale operation for this registration.\
            \ If value = true, it means that the route aging operation will be performed\
            \ on the producer registered this time; if value = false, it means that\
            \ the route aging operation will not be performed on the producer registered\
            \ this time. Without this field, the default is stale_route = true, that\
            \ is, the normal route aging process will be performed on the producer\
            \ when re-registering."
          enum:
          - "true"
          - "false"
          type: string
        url_callback:
          description: "The location will be called to notify nexthop change to producer\
            \ client The location will be called to notify prefix change to producer\
            \ client. The location will be called to notify routes that need to be\
            \ redistributed to producer client(routing protocol, for example, BGP).\
            \ The location will be called to notify EOF information to producer client."
          example: http(s)://podip:port/v1/receive-notification/
          format: url
          type: string
      required:
      - keepalive_timeout
      - rt_hold_time
      - service_name
      type: object
    consumer_info:
      example:
        url_callback: http(s)://podip:port/v1/receive-notification/
        network_instance_filters:
        - network_instance_filters
        - network_instance_filters
        keepalive_timeout: 1
        route_filters:
        - static
        - static
      properties:
        keepalive_timeout:
          description: "Unit is second. Indicates how long RIB has not received the\
            \ client's heartbeat before it considers the client to be dead. If not\
            \ present, RIB will give a default value."
          type: integer
        route_filters:
          description: "for consumer client, used to filter routes as per route type\
            \ when RIB publish routes to consumer. Only routes/nexthops that meet\
            \ both route_filters and network_instance_filters conditions will be downloaded\
            \ to comsumer."
          items:
            enum:
            - static
            - bgp
            - connected
            type: string
          type: array
          uniqueItems: true
        network_instance_filters:
          description: "for consumer client, used to filter routes as per network-instance\
            \ when RIB publish routes to consumer. Only routes/nexthops that meet\
