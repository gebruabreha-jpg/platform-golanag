        - prefix: prefix
          networkInstance: networkInstance
          addressFamily: ipv4
          status: 0
        - prefix: prefix
          networkInstance: networkInstance
          addressFamily: ipv4
          status: 0
      properties:
        clientId:
          description: "Indicates client name, for either Producer or Consumer. For\
            \ route-engine, client name is like {cre-pod-name} + {static/bgp/ifm},\
            \ for data-plane, client name is like {dp-pod-name}, for client that is\
            \ service, client name is like {service-name}."
          type: string
        registerResult:
          items:
            $ref: '#/components/schemas/prefixRegisterResultItem'
