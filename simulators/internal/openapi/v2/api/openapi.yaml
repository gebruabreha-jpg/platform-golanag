          route_eof: '#/components/schemas/ConsumerRoutesEOFNotification'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/ConsumerRoutesNotification'
      - $ref: '#/components/schemas/ConsumerNexthopsNotification'
      - $ref: '#/components/schemas/ConsumerRoutesEOFNotification'
