openapi: 3.1.0
info:
  contact:
    email: PDLDPDEVEL@pdl.internal.ericsson.com
  description: API for Routing Information Base.
  license:
    name: Ericsson
  title: Routing Information Base API
  version: 2.0.0
  x-api-id: 58092dd3-1fcd-4521-87fa-3cee018cfd9c
  x-audience: internal
  x-doc-no: CAF 201 002
servers:
- description: Routing Information Base
  url: "https://{apiRoot}:{port}/v2"
  variables:
    apiRoot:
      default: eric-pc-routing-information-base
    port:
      default: "443"
tags:
- description: Client registration and deregistration operations
  name: clients
- description: "Route creation, update and deletion operations"
  name: routes
- description: Nexthop registration and deregistration operations
  name: nexthops
- description: Prefix registration and deregistration operations
  name: prefixes
- description: Heartbeat messages
  name: heartbeats
paths:
  /producers:
    post:
      callbacks:
        notification:
          '{$request.body#/producerInfo/urlCallback}':
            post:
              description: "Notify information to the producers, please refer to ProducerNotification\
                \ below."
              operationId: producerNotification
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ProducerNotification'
                required: true
              responses:
                "200":
                  description: "OK: received successfully."
                "400":
                  $ref: '#/components/responses/400'
                "500":
                  $ref: '#/components/responses/500'
              x-callback-request: true
      description: Register a producer client into RIB
      operationId: registerProducer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Producer'
      responses:
        "200":
          description: "OK: producer client is already registered"
        "201":
          description: "Created: producer client is registered"
        "400":
          $ref: '#/components/responses/400'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - clients
  /producers/{id}:
    delete:
      description: Deregister producer client from RIB.
      operationId: deregisterProducer
      parameters:
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      responses:
        "204":
          description: "No Content: producer client deleted."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - clients
  /consumers:
    post:
      callbacks:
        notification:
          '{$request.body#/consumerInfo/urlCallback}':
            post:
              description: "notify information to consumer clients, please refer to\
                \ ConsumerNotification below."
              operationId: consumerNotification
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ConsumerNotification'
                required: true
              responses:
                "200":
                  description: "OK: received successfully."
                "400":
                  $ref: '#/components/responses/400'
                "500":
                  $ref: '#/components/responses/500'
              x-callback-request: true
      description: Register a consumer client into RIB
      operationId: registerConsumer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Consumer'
      responses:
        "201":
          description: "Created: consumer client is registered"
        "400":
          $ref: '#/components/responses/400'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - clients
  /consumers/{id}:
    delete:
      description: Deregister consumer client from RIB.
      operationId: deregisterConsumer
      parameters:
      - description: "consumer name, please refer to the clientIdentifier provided\
          \ by consumer when it register to RIB."
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      responses:
        "204":
          description: "No Content: consumer client deleted."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - clients
    patch:
      description: Update consumer client.
      operationId: updateConsumer
      parameters:
      - description: "consumer name, please refer to the clientIdentifier provided\
          \ by consumer when it register to RIB."
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumerUpdate'
        required: true
      responses:
        "201":
          description: "Created: Consumer updated."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - clients
  /network-instances/{networkInstanceName}/producers/{producerId}/routes:
    delete:
      description: "Bulk delete all routes of the specified client under {networkInstanceName}."
      operationId: bulkDeleteRoutes
      parameters:
      - description: name of networkInstance that the routes belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      responses:
        "200":
          description: "OK: handle bulk delete routes successfully."
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - routes
    post:
      description: "Producer client adds or updates or deletes routes, support bulk\
        \ routes on one time. Because of the scenarios where we need send mixed messages\
        \ of routes addition and deletion in one message, we use this API to receive\
        \ routes addition and deletion request."
      operationId: routeOperation
      parameters:
      - description: name of network instance that the routes belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/routes'
        required: true
      responses:
        "201":
          description: "Created: all routes handled successfully."
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/routesOperationResult'
          description: "Multi-Status: routes are handled partially successfully."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - routes
  /network-instances/{networkInstanceName}/producers/{producerId}/route-eof:
    post:
      description: "During startup, producer client should call this API to send route\
        \ EOF to RIB after it finishes sending all its routes of a networkInstance to\
        \ RIB."
      operationId: receiveRouteEOF
      parameters:
      - description: networkInstance to which the EOF belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/routeEoFFromProducer'
        required: true
      responses:
        "201":
          description: "Created: handle EOF information successfully."
        "400":
          $ref: '#/components/responses/400'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - routes
  /network-instances/{networkInstanceName}/producers/{producerId}/nexthops:
    delete:
      description: deregister nexthop.
      operationId: deregisterNexthop
      parameters:
      - description: networkInstance to which the nexthop belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/nexthopRegister'
        required: true
      responses:
        "204":
          description: "No Content: deregister all nexthop successfully, the nexthops\
            \ deleted."
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nexthopRegisterResult'
          description: "Multi-Status: operation result."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - nexthops
    post:
      description: "Register nexthop in RIB. if producer client wants to be aware\
        \ of the change for a nexthop, it can register the nexthop to RIB. Thus RIB\
        \ can notify producer client once the nexthop changed."
      operationId: registerNexthop
      parameters:
      - description: networkInstance to which the nexthop belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/nexthopRegister'
        required: true
      responses:
        "201":
          description: "Created: register all nexthop successfully."
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nexthopRegisterResult'
          description: "Multi-Status: operation result."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - nexthops
  /network-instances/{networkInstanceName}/producers/{producerId}/nexthop-reg-eof:
    post:
      description: "During startup, producer client should call this API to send nexthop\
        \ registration EOF to RIB after it registered all its nexthop with RIB. RIB\
        \ need know if producer client finished register nexthop with RIB."
      operationId: receiveNexthopRegistrationEOF
      parameters:
      - description: networkInstance to which the EOF belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      responses:
        "201":
          description: "Created: handle EOF information successfully."
        "400":
          $ref: '#/components/responses/400'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - nexthops
  /network-instances/{networkInstanceName}/producers/{producerId}/prefixes:
    delete:
      description: deregister a prefix.
      operationId: deregisterPrefix
      parameters:
      - description: networkInstance to which the prefix belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/prefixRegister'
        required: true
      responses:
        "204":
          description: "No Content: deregister all prefixes successfully, the prefixes\
            \ deleted."
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/prefixRegisterResult'
          description: "Multi-Status: operation result."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - prefixes
    post:
      description: "Register a prefix. if producer client want to be aware of the\
        \ change for a prefix, it can register the prefix to RIB. Thus RIB can notify\
        \ producer client once the prefix changed."
      operationId: registerPrefix
      parameters:
      - description: networkInstance to which the prefix belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/prefixRegister'
        required: true
      responses:
        "201":
          description: "Created: register all prefixes successfully."
        "207":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/prefixRegisterResult'
          description: "Multi-Status: operation result."
        "400":
          $ref: '#/components/responses/400'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - prefixes
  /network-instances/{networkInstanceName}/producers/{producerId}/prefix-reg-eof:
    post:
      description: "During startup, producer client should call this API to send prefix\
        \ registration EOF to RIB after it registered all its prefix with RIB. RIB\
        \ need know if producer client finished register prefix with RIB."
      operationId: receivePrefixRegistrationEOF
      parameters:
      - description: networkInstance to which the EOF belongs to.
        explode: false
        in: path
        name: networkInstanceName
        required: true
        schema:
          type: string
        style: simple
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: producerId
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      responses:
        "201":
          description: "Created: handle EOF information successfully."
        "400":
          $ref: '#/components/responses/400'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - prefixes
  /producers/{id}/heartbeats:
    post:
      description: Producer sends heartbeats to RIB.
      operationId: producerHeartbeat
      parameters:
      - description: "producer name, please refer to the clientIdentifier provided\
          \ by producer when it register to RIB."
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: false
      responses:
        "200":
          description: "OK: RIB received heartbeat from producer, and the producer\
            \ is in normal in RIB."
        "404":
          description: "Not Found: RIB received heartbeat from producer, but the producer\
            \ does not existed in RIB."
        "500":
          description: Internal Server Error
      tags:
      - heartbeats
  /consumers/{id}/heartbeats:
    post:
      description: Consumer send heartbeats to RIB.
      operationId: consumerHeartbeat
      parameters:
      - description: "consumer name, please refer to the clientIdentifier provided\
          \ by consumer when it register to RIB."
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/ClientIdentifier'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: false
      responses:
        "200":
          description: "OK: RIB received heartbeat from consumer, and the consumer\
            \ is in normal in RIB."
        "404":
          description: "Not Found: RIB received heartbeat from consumer, but the consumer\
            \ does not existed in RIB."
        "500":
          description: Internal Server Error
      tags:
      - heartbeats
components:
  responses:
    "400":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problemDetails'
      description: Bad Request
    "404":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problemDetails'
      description: Not Found
    "500":
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problemDetails'
      description: Internal Server Error
  schemas:
    ClientIdentifier:
      description: "Indicates client name, for either Producer or Consumer. For route-engine,\
        \ client name is like {cre-pod-name} + {static/bgp/ifm}, for data-plane, client\
        \ name is like {dp-pod-name}, for client that is service, client name is like\
        \ {service-name}."
      type: string
    Producer:
      example:
        staleRoute: true
        keepaliveTimeout: 6
        id: id
        urlCallback: https://podip:port/receive-notification/
        routeHoldTime: 0
      properties:
        id:
          description: "Indicates client name, for either Producer or Consumer. For\
            \ route-engine, client name is like {cre-pod-name} + {static/bgp/ifm},\
            \ for data-plane, client name is like {dp-pod-name}, for client that is\
            \ service, client name is like {service-name}."
          type: string
        routeHoldTime:
          description: "for producer client, unit is second. RIB will hold the routes\
            \ for the specified time after the producer client get dead. If not present,\
            \ RIB will give a default value."
          type: integer
        keepaliveTimeout:
          description: "Unit is second. Indicates how long RIB has not received the\
            \ client's heartbeat before it considers the client to be dead. If not\
            \ present, RIB will give a default value. If value = 0, indicates that\
            \ the RIB will never delete the producer based on heartbeat(For service\
            \ producer scenario)."
          type: integer
        staleRoute:
          description: "Optional field. This field is used to tell RIB when the producer\
            \ registers whether to trigger the route stale operation for this registration.\
            \ If value = true, it means that the route aging operation will be performed\
            \ on the producer registered this time. If value = false, it means that\
            \ the route aging operation will not be performed on the producer registered\
            \ this time. Without this field, the default is staleRoute = true, that\
            \ is, the normal route aging process will be performed on the producer\
            \ when re-registering."
          type: boolean
        urlCallback:
          description: "The location will be called to notify nexthop change to producer\
            \ client The location will be called to notify prefix change to producer\
            \ client. The location will be called to notify routes that need to be\
            \ redistributed to producer client(routing protocol, for example, BGP).\
            \ The location will be called to notify EOF information to producer client."
          example: https://podip:port/receive-notification/
          format: uri
          type: string
    Consumer:
      example:
        networkInstanceFilters:
        - networkInstanceFilters
        - networkInstanceFilters
        keepaliveTimeout: 0
        routeFilters:
        - static
        - static
        id: id
        urlCallback: https://podip:port/v1/receive-notification/
      properties:
        id:
          description: "Indicates client name, for either Producer or Consumer. For\
            \ route-engine, client name is like {cre-pod-name} + {static/bgp/ifm},\
            \ for data-plane, client name is like {dp-pod-name}, for client that is\
            \ service, client name is like {service-name}."
          type: string
        keepaliveTimeout:
          description: "Unit is second. Indicates how long RIB has not received the\
            \ client\"s heartbeat before it considers the client to be dead. If not\
            \ present, RIB will give a default value."
          type: integer
        routeFilters:
          description: "Currently not implemented. Cor consumer client, used to filter\
            \ routes as per route type when RIB publish routes to consumer. Only routes/nexthops\
            \ that meet both routeFilters and networkInstanceFilters conditions will\
            \ be downloaded to consumer."
          items:
            $ref: '#/components/schemas/routeType'
          type: array
          uniqueItems: true
        networkInstanceFilters:
          description: "for consumer client, used to filter routes as per networkInstance\
            \ when RIB publish routes to consumer. Only routes/nexthops that meet\
            \ both routeFilters and networkInstanceFilters conditions will be downloaded\
            \ to consumer."
          items:
            type: string
          type: array
          uniqueItems: true
        urlCallback:
          description: The location will be called to notify EOF information to consumer
            client. The location will be called to publish routes to consumer client.
          example: https://podip:port/v1/receive-notification/
          format: uri
          type: string
      required:
      - routeFilters
      - urlCallback
    ConsumerUpdate:
      description: used for consumer client to update its information. routeFilters
        and networkInstanceFilters are used to specify routes/nexthops that they need
        be download to consumer. Only routes/nexthops that meet both routeFilters
        and networkInstanceFilters conditions will be downloaded to consumer.
      example:
        networkInstanceFilters:
        - networkInstanceFilters
        - networkInstanceFilters
        routeFilters:
        - static
        - static
      properties:
        routeFilters:
          description: "Currently not implemented. For consumer client, used to filter\
            \ routes as per route type when RIB publish routes to consumer. It shall\
            \ include all route types that consumer need. Only routes/nexthops that\
            \ meet both routeFilters and networkInstanceFilters conditions will be\
            \ downloaded to consumer."
          items:
            $ref: '#/components/schemas/routeType'
          type: array
          uniqueItems: true
        networkInstanceFilters:
          description: "for consumer client, used to filter routes as per networkInstance\
            \ when RIB publish routes to consumer. It shall include all MWs that consumer\
            \ need. Only routes/nexthops that meet both routeFilters and networkInstanceFilters\
            \ conditions will be downloaded to consumer."
          items:
            type: string
          type: array
          uniqueItems: true
      required:
      - networkInstanceFilters
      - routeFilters
    ProducerNotification:
      example:
        msg:
          type: nexthop_change
          items:
          - viaAddressInfo:
              address: address
              type: ip
              addressFamily: null
            address: address
            viaNetworkInstance: viaNetworkInstance
            metric: 0
            nexthopTimestamp: null
            networkInstance: networkInstance
            flags:
            - nexthop_on_lsp
            - nexthop_on_lsp
            protocolType: static
            priority: null
            addressFamily: ipv4
          - viaAddressInfo:
              address: address
              type: ip
              addressFamily: null
            address: address
            viaNetworkInstance: viaNetworkInstance
            metric: 0
            nexthopTimestamp: null
            networkInstance: networkInstance
            flags:
            - nexthop_on_lsp
            - nexthop_on_lsp
            protocolType: static
            priority: null
            addressFamily: ipv4
        producerId: producerId
      properties:
        producerId:
          description: "Indicates client name, for either Producer or Consumer. For\
            \ route-engine, client name is like {cre-pod-name} + {static/bgp/ifm},\
            \ for data-plane, client name is like {dp-pod-name}, for client that is\
            \ service, client name is like {service-name}."
          type: string
        msg:
          $ref: '#/components/schemas/ProducerNotification_msg'
    QueryNexthopNotificationEOF:
      properties:
        type:
          enum:
          - nexthop_response_eof
          type: string
        networkInstance:
          type: string
    QueryNexthopNotification:
      example:
        type: nexthop_change
        items:
        - viaAddressInfo:
            address: address
            type: ip
            addressFamily: null
          address: address
          viaNetworkInstance: viaNetworkInstance
          metric: 0
          nexthopTimestamp: null
          networkInstance: networkInstance
          flags:
          - nexthop_on_lsp
          - nexthop_on_lsp
          protocolType: static
          priority: null
          addressFamily: ipv4
        - viaAddressInfo:
            address: address
            type: ip
            addressFamily: null
          address: address
          viaNetworkInstance: viaNetworkInstance
          metric: 0
          nexthopTimestamp: null
          networkInstance: networkInstance
          flags:
          - nexthop_on_lsp
          - nexthop_on_lsp
          protocolType: static
          priority: null
          addressFamily: ipv4
      properties:
        type:
