        addressInfo:
          $ref: '#/components/schemas/nexthopAddressInfo'
        label:
          description: For vpn and mpls label forwarding.
          type: integer
        interfaceType:
          $ref: '#/components/schemas/interfaceType'
        priority:
          description: "Nexthop priority. The higher the value, the lower the priority"
          maximum: 255
          minimum: 0
          type: integer
