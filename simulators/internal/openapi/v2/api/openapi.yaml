        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/QueryNexthopNotification'
      - $ref: '#/components/schemas/QueryNexthopNotificationEOF'
      - $ref: '#/components/schemas/QueryPrefixNotification'
      - $ref: '#/components/schemas/QueryPrefixNotificationEOF'
