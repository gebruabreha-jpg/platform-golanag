      description: "Nexthop identifer which composed by nexthop networkInstance and\
        \ nexthop id. If above \"action\" is \"add\", the item is required."
      example:
        networkInstance: networkInstance
        id: 0
      properties:
        networkInstance:
          description: The network instance which nexthop belongs to.
          type: string
        id:
          description: "Nexthop id, identify a nexthop."
          type: integer
    ConsumerNexthopsNotificationItem_type:
      description: Nexthop type.
      oneOf:
      - enum:
        - connect
        - non_connect
        - l3vpn
        - ecmp
        - mpls
        - service_local
        type: string
      - type: string
    ConsumerNexthopsNotificationItem_entry_inner_viaNexthop:
      description: Via nexthop identifer which composed by nexthop networkInstance
