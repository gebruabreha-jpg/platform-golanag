        addressFamily: ipv4
        status: 0
    prefixRegister:
      properties:
        prefixes:
          items:
            $ref: '#/components/schemas/prefixRegisterItem'
          type: array
          uniqueItems: true
    prefixRegisterItem:
      properties:
        prefix:
