      description: "if the route is lsp or non-lsp. If not present, the default is\
        \ non-lsp."
      oneOf:
      - enum:
        - non_lsp
        - lsp
        type: string
      - type: string
    prefixNexthopType:
      oneOf:
      - enum:
        - prefix_reg_nexthop_best
        - prefix_reg_nexthop_on_ip_or_adj
        - prefix_reg_nexthop_all_lsp
        type: string
      - type: string
