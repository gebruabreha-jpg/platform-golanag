            networkInstance: networkInstance
            action: add
            type: static
            addressFamily: ipv4
            nexthop:
              networkInstance: networkInstance
              id: 0
            timestamp: 2000-01-23T04:56:07.000+00:00
          - argument: argument
            prefix: prefix
            networkInstance: networkInstance
            action: add
            type: static
            addressFamily: ipv4
            nexthop:
              networkInstance: networkInstance
              id: 0
            timestamp: 2000-01-23T04:56:07.000+00:00
          type: routes
        consumerId: consumerId
      properties:
        consumerId:
          description: "Indicates client name, for either Producer or Consumer. For\
            \ route-engine, client name is like {cre-pod-name} + {static/bgp/ifm},\
            \ for data-plane, client name is like {dp-pod-name}, for client that is\
            \ service, client name is like {service-name}."
          type: string
        msg:
          $ref: '#/components/schemas/ConsumerNotification_msg'
    ConsumerRoutesEOFNotification:
      description: "After RIB publish all its existed routes/nexthops to consumer,\
