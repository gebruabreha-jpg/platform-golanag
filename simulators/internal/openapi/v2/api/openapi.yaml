            \ \"add\", the item is required."
          items:
            $ref: '#/components/schemas/ConsumerNexthopsNotificationItem_entry_inner'
          type: array
          uniqueItems: true
        timestamp:
          format: date-time
          type: string
    routes:
      properties:
        routes:
          items:
            $ref: '#/components/schemas/routeArrayItem'
          type: array
    routeArrayItem:
      discriminator:
        mapping:
          add: '#/components/schemas/addRouteItem'
          delete: '#/components/schemas/deleteRouteItem'
        propertyName: action
      oneOf:
      - $ref: '#/components/schemas/addRouteItem'
      - $ref: '#/components/schemas/deleteRouteItem'
    addRouteItem:
      properties:
        prefix:
          description: A valid IP prefix.
          type: string
        addressFamily:
          $ref: '#/components/schemas/addressFamily'
        action:
          description: Operation action.
          enum:
          - add
          type: string
        lsp:
          $ref: '#/components/schemas/RouteLspType'
        dist:
          description: "Distance. If not present, RIB will grant the deault distance\
            \ of the protocol."
          type: integer
        metric:
          description: "if not present, RIB will grant zero to the metric."
          type: integer
        routeType:
          $ref: '#/components/schemas/routeType'
        protocol:
          description: sub protocol type of the route.
          items:
            $ref: '#/components/schemas/addRouteItem_protocol_inner'
          type: array
        argument:
          description: "Optional private argument, used to carry additional routing\
            \ attributes. This private argument will not be involved in route calculation."
          type: string
        nexthopNumber:
          description: Nexthop number.
          type: integer
        nexthops:
          description: Nexthop information.
          items:
            $ref: '#/components/schemas/routeNexthopInfo'
          type: array
      required:
      - action
      - addressFamily
      - lsp
      - nexthopNumber
      - nexthops
      - prefix
      - routeType
    routeNexthopInfo:
      properties:
        networkInstance:
          description: Network instance.
          type: string
        attr:
          description: |-
            Attributes of the nexthop of the route. Some attributes makes others mandatory:
              - vpn_label: the vpn_label of labels field must be filled
              - label: the label of labels field must be filled
              - service_local: the addressInfo must be filled with a service type
          items:
            $ref: '#/components/schemas/routeNexthopInfo_attr_inner'
          type: array
          uniqueItems: true
        addressInfo:
          $ref: '#/components/schemas/nexthopAddressInfo'
        interfaceInfo:
          $ref: '#/components/schemas/interfaceInfo'
        labels:
          $ref: '#/components/schemas/nexthopLabels'
        priority:
          description: "Nexthop priority. The higher the value, the lower the priority"
          maximum: 255
          minimum: 0
          type: integer
      required:
      - addressInfo
    serviceNexthop:
      description: Nexthop Service Local (Fabric Route) with name and (optionally)
        instance id.
      properties:
        serviceName:
          description: Name of the service.
          type: string
        instanceId:
          description: Pod unique ID.
          type: string
      required:
      - serviceName
    ipNexthop:
      description: Nexthop IP address and family.
      properties:
        address:
          description: A valid IP address.
          type: string
        addressFamily:
          $ref: '#/components/schemas/addressFamily'
      required:
      - address
      - addressFamily
    interfaceInfo:
      properties:
        interfaceName:
          description: "For subnet route, needs to carry interface name for display. for\
            \ other routes, interface name is not needed."
          type: string
        interfaceType:
          $ref: '#/components/schemas/interfaceType'
    nexthopLabels:
      properties:
        vpnLabel:
          description: "Nexthop vpn label, when attr = vpn_label of nexthopInformation,\
            \ the field should be filled, indicates private network routing label"
          type: integer
        label:
          description: "Nexthop label, When attr = label of nexthopInformation, the\
            \ field should be filled, indicates public network routing label"
          type: integer
    deleteRouteItem:
      properties:
        prefix:
          description: A valid IP prefix.
          type: string
        addressFamily:
          $ref: '#/components/schemas/addressFamily'
        action:
