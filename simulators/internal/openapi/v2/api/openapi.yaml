          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          format: uri
          type: string
        cause:
          type: string
        invalidParams:
          items:
            $ref: '#/components/schemas/invalidParam'
          minItems: 1
          type: array
    ProducerNotification_msg:
