      - type: string
    ipv4Address:
      description: A valid IPv4 address.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      type: string
    ipv6Address:
      description: A valid IPv6 address.
      nullable: true
      type: string
    ipAddress:
      description: A valid IP address.
      type: string
    ipv4Prefix:
      description: A valid IPv4 prefix.
      example: 198.51.100.1/24
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])(\\\
        /(([0-9])|([1-2][0-9])|(2[0-1][0-9])|(3[0-2])))$"
      type: string
    ipv6Prefix:
      description: A valid IPv6 prefix.
      nullable: true
      type: string
    ipPrefix:
      description: A valid IP prefix.
      type: string
    Priority:
      description: "Nexthop priority. The higher the value, the lower the priority"
      maximum: 255
      minimum: 0
      type: integer
    invalidParam:
      properties:
