      properties:
        networkInstance:
          description: The networkInstance which via nexthop belongs to.
          type: string
        id:
          description: "Nexthop id, identify a nexthop. Optional, if \"id\" is empty(none),\
            \ it means that the current nexthop is the final nexthop."
          type: integer
