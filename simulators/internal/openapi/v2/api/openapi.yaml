      - enum:
        - vpn_label
        - label
        - inter_network_instance
        - service_local
        type: string
      - type: string
    prefixRegisterItem_lookupType:
      oneOf:
      - enum:
        - prefix_reg_lpm
        - prefix_reg_exct
        type: string
      - type: string
