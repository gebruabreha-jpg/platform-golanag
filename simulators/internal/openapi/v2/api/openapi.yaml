      properties:
        type:
          enum:
          - route_eof
          type: string
    ConsumerRoutesNotification:
      example:
        routes:
        - argument: argument
          prefix: prefix
          networkInstance: networkInstance
          action: add
          type: static
          addressFamily: ipv4
          nexthop:
            networkInstance: networkInstance
            id: 0
          timestamp: 2000-01-23T04:56:07.000+00:00
        - argument: argument
          prefix: prefix
          networkInstance: networkInstance
          action: add
          type: static
          addressFamily: ipv4
          nexthop:
            networkInstance: networkInstance
            id: 0
          timestamp: 2000-01-23T04:56:07.000+00:00
        type: routes
      properties:
        type:
          enum:
          - routes
          type: string
        routes:
          items:
            $ref: '#/components/schemas/ConsumerRoutesNotificationItem'
          type: array
    ConsumerRoutesNotificationItem:
      example:
        argument: argument
        prefix: prefix
        networkInstance: networkInstance
        action: add
        type: static
        addressFamily: ipv4
        nexthop:
          networkInstance: networkInstance
          id: 0
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        action:
          $ref: '#/components/schemas/ConsumerRoutesNotificationItem_action'
        networkInstance:
          description: Network instance.
          type: string
        addressFamily:
          $ref: '#/components/schemas/addressFamily'
        prefix:
          description: A valid IP prefix.
          type: string
        type:
          $ref: '#/components/schemas/routeType'
        nexthop:
          $ref: '#/components/schemas/ConsumerRoutesNotificationItem_nexthop'
        timestamp:
          format: date-time
          type: string
        argument:
          description: "Optional private argument, used to carry additional routing\
            \ attributes to consumer. This private argument will not be involved in\
            \ route calculation."
          type: string
    ConsumerNexthopsNotification:
      properties:
        type:
          enum:
          - nexthops
          type: string
        nexthops:
          items:
            $ref: '#/components/schemas/ConsumerNexthopsNotificationItem'
          type: array
    ConsumerNexthopsNotificationItem:
      properties:
        action:
          $ref: '#/components/schemas/ConsumerRoutesNotificationItem_action'
        id:
          description: "Nexthop id, identify a nexthop."
          type: integer
        type:
          $ref: '#/components/schemas/ConsumerNexthopsNotificationItem_type'
        networkInstance:
          description: The network instance which nexthop belongs to.
          type: string
        addressFamily:
          $ref: '#/components/schemas/addressFamily'
        entry:
          description: "Nexthop entry, used to indicate the address information of\
